server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Cloudflare arkasında HTTP olarak çalışıyoruz; redirect'leri relative
    # yap ki Location header HTTP'den HTTPS'e bozulmasın (HTTPS-only browser
    # scheme korunur, "Devamı" linki download yapmaz).
    absolute_redirect off;
    port_in_redirect off;

    # Routing
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Astro hash'li build artifacts (asla değişmez) — kalıcı immutable
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Yazı tipi dosyaları (genelde değişmez)
    location ~* \.(woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Resim ve sabit isimli dosyalar — kısa cache + revalidate
    # (foto güncellendiğinde browser yeni kontrolü zorunlu yapar)
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|avif|css|js)$ {
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Error pages
    error_page 404 /404.html;
}
