name: Deploy to Dual Coolify
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Istanbul
        if: vars.COOLIFY_IST_UUID != ''
        run: |
          curl -sf -X POST "http://coolify2.siberkale.com:8000/api/v1/applications/${{ vars.COOLIFY_IST_UUID }}/restart" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_IST_TOKEN }}" || echo "Istanbul deploy failed"

      - name: Deploy to Sakarya
        if: vars.COOLIFY_SAK_UUID != ''
        run: |
          curl -sf -X POST "https://coolify.siberkale.com/api/v1/applications/${{ vars.COOLIFY_SAK_UUID }}/restart" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_SAK_TOKEN }}" || echo "Sakarya deploy failed"
